<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader do YouTube</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../youtube-style.css"> <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="page-content">
        <div class="content-card">
            <div class="card-inner" id="youtubeDownloaderCard">
                <h1>Downloader do YouTube</h1>
                <p>Cole um link do YouTube para baixar o vídeo ou apenas o áudio.</p>
                
                <div class="input-group">
                    <input type="url" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
                </div>

                <div class="options-group">
                    <p class="options-title">Escolha o formato:</p>
                    <div class="radio-container">
                        <label>
                            <input type="radio" name="downloadType" value="video" checked>
                            <span class="radio-label">📹 Vídeo (MP4)</span>
                        </label>
                        <label>
                            <input type="radio" name="downloadType" value="audio">
                            <span class="radio-label">🎵 Áudio (MP3)</span>
                        </label>
                    </div>
                </div>

                <button id="action-btn">Analisar Link</button>

                <div class="results-area" id="resultsArea" style="display: none;">
                    <hr>
                    <img id="videoThumbnail" src="" alt="Miniatura do vídeo">
                    <h3 id="videoTitle">Título do Vídeo</h3>
                    <p>Seu arquivo está pronto para download!</p>
                    <button class="button-download" id="downloadBtn">Baixar Agora</button>
                </div>
            </div>
        </div>
    </main>
    
    <script src="../script.js"></script>
</body>
</html>
