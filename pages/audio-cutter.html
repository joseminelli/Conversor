<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortador de Áudio</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/audio-cutter.css">
    <link rel="stylesheet" href="../youtube-style.css"> <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="page-content">
        <div class="content-card">
            <div class="card-inner" id="audioCutterCard">
                <h1>Cortador de Áudio</h1>
                <p>Carregue um áudio, selecione um trecho e baixe o resultado.</p>
                
                <label for="audioInput" class="custom-file-upload">Clique para escolher o arquivo de áudio</label>
                <input type="file" id="audioInput" accept="audio/*">
                <div id="fileName">Nenhum arquivo selecionado</div>
                
                <div id="waveform-container">
                    <div id="waveform"></div>
                    <div id="loading-indicator" style="display: none;">Analisando áudio...</div>
                </div>

                <div id="controls" style="display: none;">
                    <div class="time-inputs">
                        <label>Início: <input type="text" id="startTime" readonly></label>
                        <label>Fim: <input type="text" id="endTime" readonly></label>
                    </div>
                    <div class="action-buttons">
                        <button id="playBtn">▶️ Play/Pause</button>
                        <button id="previewBtn">🎵 Prévia da Seleção</button>
                        <button id="action-btn" class="main-action">✂️ Cortar e Baixar</button>
                    </div>
                </div>

            </div>
        </div>
    </main>
    
    <script src="../script.js"></script>
</body>
</html>
