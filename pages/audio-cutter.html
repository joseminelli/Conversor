<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cortador de Áudio Nativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/audio-cutter.css" />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="page-content">
        <div class="content-card">
            <div class="card-inner" id="audioCutterCard">
                <div id="upload-area">
                    <h1>Cortador de Áudio</h1>
                    <p>Corte seus arquivos de áudio diretamente no navegador.</p>
                    <label for="audio-file-input" class="upload-button">
                        <i class="fa-solid fa-upload"></i> Escolher Arquivo
                    </label>
                    <input type="file" id="audio-file-input" accept="audio/*" />
                </div>

                <div id="editor-area" class="hidden">
                    <div id="waveform-wrapper">
                        <canvas id="waveform-canvas"></canvas>
                        <div id="playhead"></div>
                    </div>
                    <div class="controls-wrapper">
                        <div class="time-display">
                            <span id="current-time">00:00</span> / <span id="total-time">00:00</span>
                        </div>
                        <div class="main-controls">
                             <button id="play-btn" title="Play/Pause"><i class="fa-solid fa-play"></i></button>
                             <button id="mark-start-btn" class="mark-button">[ Marcar Início</button>
                             <button id="mark-end-btn" class="mark-button">Marcar Fim ]</button>
                        </div>
                         <div class="output-controls">
                            <button id="preview-btn" disabled><i class="fa-solid fa-headphones"></i> Ouvir Seleção</button>
                            <button id="cut-btn" class="main-action" disabled><i class="fa-solid fa-scissors"></i> Cortar e Baixar</button>
                         </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="../js/common.js" defer></script>
    <script src="../js/audio-cutter.js" defer></script> 
</body>
</html>
